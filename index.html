<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <meta http-equiv="X-UA-Compatible" content="ie=edge">
 <title>Calculator</title>
 <link rel="stylesheet" href="style.css">
 <!-- font awesome cdn -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
 
 <!-- calculator -->
 <div class="calculator">
  <div class="calculator-heading">
   <h3 class="calculator-title">Calculator</h3>
   <div class="calculator-icons">
    <i class="fa-brands fa-github"></i>
   </div>
  </div>
  <input class="calculator-display" id="calculatorDisplay" readonly>
  <div class="calculator-buttons">
   <button class="btn btn-key">AC</button>
   <button class="btn btn-key">R</button>
   <button class="btn btn-operator">%</button>
   <button class="btn btn-operator">/</button>
   
   <button class="btn">7</button>
   <button class="btn">8</button>
   <button class="btn">9</button>
   <button class="btn btn-operator">*</button>
   
   <button class="btn">4</button>
   <button class="btn">5</button>
   <button class="btn">6</button>
   <button class="btn btn-operator">-</button>
   
   <button class="btn">1</button>
   <button class="btn">2</button>
   <button class="btn">3</button>
   <button class="btn btn-operator">+</button>
   
   <button class="btn">0</button>
   <button class="btn">.</button>
   <button class="equal btn btn-key">=</button>
  </div>
 </div>
 
 <!-- javascript -->
 <script src="main.js"></script>
 
</body>
</html>
